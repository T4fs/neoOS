# neoOS Window Rules
# Application-specific window rules

# Floating windows
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(thunar)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save File)$

# Size rules
windowrulev2 = size 800 600, class:^(pavucontrol)$
windowrulev2 = size 800 600, class:^(nm-connection-editor)$

# Workspace rules
windowrulev2 = workspace 1, class:^(firefox)$
windowrulev2 = workspace 2, class:^(kitty)$
windowrulev2 = workspace 3, class:^(code-oss)$
windowrulev2 = workspace 4, class:^(thunar)$
windowrulev2 = workspace 5, class:^(spotify)$
windowrulev2 = workspace 9, class:^(discord)$
windowrulev2 = workspace 10, class:^(obsidian)$

# Opacity rules
windowrulev2 = opacity 0.90 0.85, class:^(kitty)$
windowrulev2 = opacity 0.90 0.85, class:^(thunar)$
windowrulev2 = opacity 0.90 0.85, class:^(code-oss)$
windowrulev2 = opacity 0.95 0.90, class:^(firefox)$

# Blur rules
windowrulev2 = blur, class:^(kitty)$
windowrulev2 = blur, class:^(thunar)$
windowrulev2 = blur, class:^(code-oss)$
